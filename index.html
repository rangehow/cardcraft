<style>
/* ===== APP SHELL ===== */
:root{--bg:#0f0f17;--sf:#1a1a2e;--bd:#2a2a40;--tx:#e0e0e8;--dim:#8888a0;--ac:#6C5CE7;--al:#A29BFE;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900}
.logo .ic{width:32px;height:32px;background:linear-gradient(135deg,#6C5CE7,#A29BFE);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.actions{display:flex;align-items:center;gap:10px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-p{background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:#fff}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.4)}
.btn-p:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-g{background:transparent;color:var(--dim);padding:7px 12px;text-decoration:none}
.btn-g:hover{color:var(--al)}

/* Layout */
.main{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 57px)}
@media(max-width:900px){.main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}

/* Editor */
.ed{display:flex;flex-direction:column;border-right:1px solid var(--bd)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02)}
.ph-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim)}
.sb{padding:10px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:rgba(255,255,255,.015)}
.sg{display:flex;align-items:center;gap:6px}
.sl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.sg select,.sg input{background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:12px;font-family:inherit;outline:none}
.sg select:focus,.sg input:focus{border-color:var(--ac)}
#md-input{flex:1;width:100%;background:transparent;color:var(--tx);border:none;padding:18px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;resize:none;outline:none;tab-size:2}
#md-input::placeholder{color:var(--dim)}
.st{padding:8px 18px;border-top:1px solid var(--bd);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;background:var(--sf)}

/* Preview */
.pv{display:flex;flex-direction:column;background:#111119;overflow:hidden}
.ps{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}

/* Card frame in preview */
.cf{position:relative;border-radius:10px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.5);flex-shrink:0}
.cb{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:16px;z-index:10;backdrop-filter:blur(4px)}

/* Progress */
.pb{height:3px;background:var(--bd);position:relative}
.pf{height:100%;background:linear-gradient(90deg,#6C5CE7,#A29BFE);transition:width .3s;width:0%}

/* Empty */
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);text-align:center;padding:40px}
.es .ei{font-size:56px;margin-bottom:16px;opacity:.3}
.es h3{font-size:16px;margin-bottom:6px;color:var(--tx)}
.es p{font-size:13px;line-height:1.6;max-width:320px}

/* Theme dots */
.tp{display:flex;gap:5px}
.td{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.td:hover{transform:scale(1.15)}
.td.on{border-color:#fff;box-shadow:0 0 0 2px var(--ac)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2a40;color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px;color:#fff;font-size:16px}
.ov.on{display:flex}
.sp{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#A29BFE;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.dh{border:3px dashed var(--ac)!important;background:rgba(108,92,231,.05)!important}

.xhs-card{
  width:1080px;
  position:relative;
  overflow:hidden;
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

/* The card-body fills the card, uses flexbox to push content together and let gap absorb space */
.xhs-card .card-body{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:64px 68px 48px;
  overflow:hidden;
}

/* Content wrapper — grows to fill, distributes children */
.xhs-card .card-body .content-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Content fills naturally from top */
.xhs-card .card-body .content-wrap .content{
  flex:0 0 auto;
}

.xhs-card .card-foot{
  padding:0 68px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
  opacity:.45;
  flex-shrink:0;
}

/* Section header */
.xhs-card .sec-hd{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-shrink:0}
.xhs-card .sec-n{font-size:22px;font-weight:800;width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.xhs-card .sec-t{font-size:36px;font-weight:900;line-height:1.3}

/* Content typography — LARGE for mobile */
.xhs-card .content h3{font-size:26px;font-weight:700;margin:24px 0 12px;padding-left:14px;border-left:4px solid}
.xhs-card .content h4{font-size:23px;font-weight:700;margin:20px 0 10px}
.xhs-card .content p{font-size:23px;line-height:1.8;margin-bottom:14px}
.xhs-card .content strong{font-weight:700}
.xhs-card .content em{font-style:italic}
.xhs-card .content code:not(pre code){padding:2px 7px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:20px}
.xhs-card .content pre{border-radius:14px;padding:20px 22px;margin:14px 0 16px;overflow-x:hidden;font-size:17px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.xhs-card .content pre code{font-family:'JetBrains Mono',monospace;background:none;padding:0;font-size:inherit}
.xhs-card .content table{width:100%;border-collapse:separate;border-spacing:0;margin:14px 0 16px;border-radius:12px;overflow:hidden;font-size:20px}
.xhs-card .content thead th{padding:11px 14px;font-weight:700;text-align:left;font-size:19px}
.xhs-card .content tbody td{padding:10px 14px;line-height:1.5;vertical-align:top}
.xhs-card .content blockquote{border-radius:0 12px 12px 0;padding:16px 20px;margin:14px 0 16px;font-size:21px;line-height:1.7}
.xhs-card .content blockquote p{margin-bottom:4px;font-size:21px}
.xhs-card .content ul,.xhs-card .content ol{margin:10px 0 14px 30px;font-size:23px;line-height:1.8}
.xhs-card .content li{margin-bottom:6px}
.xhs-card .content hr{border:none;height:2px;margin:28px 0}

/* Cover */
.xhs-card.cover .card-body{justify-content:center;align-items:center;text-align:center;padding:70px 56px}
.xhs-card.cover .cv-emoji{font-size:80px;margin-bottom:30px}
.xhs-card.cover h1{font-size:54px;font-weight:900;line-height:1.3;margin-bottom:28px;letter-spacing:-1px}
.xhs-card.cover .cv-sub{font-size:26px;line-height:1.7;max-width:840px;opacity:.9}
.xhs-card.cover .cv-tag{margin-top:40px;padding:14px 32px;border-radius:28px;font-size:22px;font-weight:600}
.xhs-card.cover .cv-deco{margin-top:auto;display:flex;gap:7px;justify-content:center;padding-top:40px;opacity:.2}
.xhs-card.cover .cv-deco i{display:block;width:5px;height:5px;border-radius:50%;background:currentColor}

<script>
/* ==========================================================================
   CardCraft v2 — Fast DOM preview + snapDOM export
   ==========================================================================
   Key insight: preview shows LIVE DOM (instant), snapDOM only at download.
   No more html2canvas, no multi-pass measurement, no blank-space hacking.
   Instead: render full article → measure → slice at block boundaries → done.
   ========================================================================== */

let theme = 'violet';
let cardBlobs = [];
let timer = null;
let busy = false;
let ver = 0;

const CARD_W = 1080;
const RATIOS = {'3:4':1440,'2:3':1620,'9:16':1920,'1:1':1080};
function getH(){return RATIOS[document.getElementById('sel-r').value]||1440}
const brand = () => document.getElementById('inp-b').value||'CardCraft';

marked.setOptions({gfm:true,breaks:false,highlight:(c,l)=>{
  try{return l&&hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value}
  catch(e){return c}
}});

/* ---- Events ---- */
document.getElementById('tp').onclick=e=>{
  const d=e.target.closest('.td');if(!d)return;
  document.querySelectorAll('.td').forEach(x=>x.classList.remove('on'));
  d.classList.add('on');theme=d.dataset.t;go();
};
document.getElementById('sel-r').onchange=go;
document.getElementById('inp-b').oninput=go;
const inp=document.getElementById('md-input');

function go(){if(timer)clearTimeout(timer);
  if(!inp.value.trim()){clearPreview();return}
  stat('⏳ 等待输入…');timer=setTimeout(generate,400)}

function clearPreview(){
  document.getElementById('ps').innerHTML='<div class="es"><div class="ei">✦</div><h3>粘贴 Markdown，即时预览</h3><p>输入内容后卡片自动生成</p></div>';
  document.getElementById('btn-dl').disabled=true;
  document.getElementById('st-c').textContent='';
  document.getElementById('pv-i').textContent='';
  stat('粘贴 Markdown 开始');prog(0);cardBlobs=[];}


/* ======================================================================
   CORE: Parse → Measure → Slice → Preview (all synchronous DOM ops)
   ====================================================================== */

async function generate(){
  const md=inp.value.trim();if(!md)return;
  const myVer=++ver;busy=true;
  stat('解析中…');prog(5);

  // 1. Parse into sections by ## headings
  const secs=parse(md);
  if(myVer!==ver)return;

  // 2. For each section, measure + slice into cards
  const cards=[];
  const stage=document.getElementById('stage');
  const CARD_H=getH();
  stat('排版 '+secs.length+' 个章节…');prog(15);

  for(let si=0;si<secs.length;si++){
    if(myVer!==ver)return;
    const sec=secs[si];
    prog(15+si/secs.length*60);

    if(sec.type==='cover'){
      cards.push({type:'cover',title:sec.title,md:sec.md,html:''});
      continue;
    }

    // Render section as one tall card (no height limit) to get natural height
    const html=marked.parse(sec.md);
    const headerHTML=sec.num
      ?`<div class="sec-hd"><div class="sec-n">${esc(sec.num)}</div><div class="sec-t">${esc(sec.title)}</div></div>`
      :(sec.title?`<div class="sec-hd"><div class="sec-t">${esc(sec.title)}</div></div>`:'');

    // Measure at natural height
    stage.innerHTML=`<div class="t-${theme}"><div class="xhs-card" style="width:${CARD_W}px">
      <div class="card-body"><div class="content-wrap">${headerHTML}<div class="content">${html}</div></div></div></div></div>`;
    await frame();
    const fullH=stage.querySelector('.xhs-card').scrollHeight;

    if(fullH<=CARD_H){
      // Fits in one card
      cards.push({type:'section',title:sec.title,num:sec.num,headerHTML,contentHTML:html});
      stage.innerHTML='';
      continue;
    }

    // Too tall — need to split by block boundaries
    // Get each top-level child of .content and measure cumulative heights
    const contentEl=stage.querySelector('.content');
    const children=Array.from(contentEl.children);
    const headerH=stage.querySelector('.sec-hd')?.offsetHeight||0;
    const bodyStyle=getComputedStyle(stage.querySelector('.card-body'));
    const padTop=parseFloat(bodyStyle.paddingTop)||64;
    const padBot=parseFloat(bodyStyle.paddingBottom)||48;
    const footH=56; // footer height
    const usable=CARD_H-padTop-padBot-footH;

    // Measure each child's offsetTop relative to content
    const childData=children.map((ch,i)=>({
      el:ch,
      top:ch.offsetTop,
      bot:ch.offsetTop+ch.offsetHeight,
      html:ch.outerHTML
    }));

    // Greedy slice: pack children until they exceed usable height
    let sliceStart=0;
    let partNum=0;
    const firstUsable=usable-headerH-28; // first card has section header

    while(sliceStart<childData.length){
      partNum++;
      const isFirst=(partNum===1);
      const maxH=isFirst?firstUsable:usable;
      const origin=childData[sliceStart].top;

      let sliceEnd=sliceStart;
      for(let j=sliceStart;j<childData.length;j++){
        const relBot=childData[j].bot-origin;
        if(relBot>maxH && j>sliceStart) break;
        sliceEnd=j+1;
      }

      // If we couldn't fit even one child, force include it
      if(sliceEnd===sliceStart) sliceEnd=sliceStart+1;

      const sliceHTML=childData.slice(sliceStart,sliceEnd).map(c=>c.html).join('\n');
      const hdr=isFirst?headerHTML:(sec.num
        ?`<div class="sec-hd"><div class="sec-n">${esc(sec.num)}</div><div class="sec-t">${esc(sec.title)}（续）</div></div>`
        :(sec.title?`<div class="sec-hd"><div class="sec-t">${esc(sec.title)}（续）</div></div>`:''));

      cards.push({type:'section',title:sec.title+(partNum>1?'（续）':''),num:sec.num,headerHTML:hdr,contentHTML:sliceHTML});
      sliceStart=sliceEnd;
    }
    stage.innerHTML='';
  }

  if(myVer!==ver)return;

  // 3. Forward-merge: try combining adjacent small cards
  const merged=forwardMerge(cards,CARD_H,stage);
  if(myVer!==ver)return;

  // 3b. Block stealing: fill underfilled cards by taking elements from next card
  stealBlocks(merged,CARD_H,stage);
  if(myVer!==ver)return;

  // 4. Backward-merge trailing short card
  await backwardMerge(merged,CARD_H,stage);
  if(myVer!==ver)return;

  // 5. Render preview (live DOM, instant)
  stat('渲染预览…');prog(85);
  const ps=document.getElementById('ps');
  ps.innerHTML='';
  const total=merged.length;
  const scale=Math.min(1,(ps.clientWidth-40)/CARD_W);
  const CARD_H_=getH();

  for(let i=0;i<total;i++){
    const card=merged[i];
    const frame=document.createElement('div');
    frame.className='cf';
    frame.style.width=(CARD_W*scale)+'px';
    frame.style.height=(CARD_H_*scale)+'px';

    const badge=document.createElement('div');
    badge.className='cb';badge.textContent=`${i+1}/${total}`;

    // Mark last card for vertical centering if underfilled
    if(i===total-1 && card.type!=='cover') card._isLast=true;

    const wrap=document.createElement('div');
    wrap.style.cssText=`width:${CARD_W}px;height:${CARD_H_}px;transform:scale(${scale});transform-origin:top left;`;
    wrap.innerHTML=buildCardDOM(card,i+1,total);

    frame.appendChild(badge);
    frame.appendChild(wrap);
    ps.appendChild(frame);
  }

  // Store card data for download
  cardBlobs=merged.map((c,i)=>({card:c,idx:i,total}));
  document.getElementById('btn-dl').disabled=false;
  document.getElementById('st-c').textContent=total+' 张';
  document.getElementById('pv-i').textContent=`${CARD_W}×${CARD_H_} · ${total} 张`;
  stat('✅ '+total+' 张卡片');
  prog(100);
  busy=false;
}


/* ---- Forward merge ---- */
function forwardMerge(cards,CARD_H,stage){
  if(cards.length<=1)return cards;
  const result=[cards[0]];
  for(let i=1;i<cards.length;i++){
    const cur=cards[i];
    const prev=result[result.length-1];
    // Don't merge covers, and don't merge if either has a section header with different num
    if(cur.type==='cover'||prev.type==='cover'){result.push(cur);continue}
    // Try merge
    const mHTML=prev.contentHTML+'\n<hr>\n'+
      (cur.headerHTML?cur.headerHTML:'')+'\n'+cur.contentHTML;
    const mCard={...prev,contentHTML:mHTML};
    const h=measureCard(mCard,CARD_H,stage);
    if(h<=CARD_H){
      prev.contentHTML=mHTML;
    } else {
      result.push(cur);
    }
  }
  return result;
}

/* ---- Block stealing: fill underfilled cards by taking DOM children from next card ---- */
function stealBlocks(cards,CARD_H,stage){
  // Iterate pairs: for each card, if underfilled, try stealing children from next
  let changed=true;
  while(changed){
    changed=false;
    for(let i=0;i<cards.length-1;i++){
      const cur=cards[i];const nxt=cards[i+1];
      if(cur.type==='cover'||nxt.type==='cover')continue;

      // Measure current card fill
      const curH=measureCard(cur,CARD_H,stage);
      if(curH/CARD_H>=0.80)continue; // Already well-filled

      // Parse next card's content into DOM children
      const tmp=document.createElement('div');
      tmp.innerHTML=nxt.contentHTML;
      const children=Array.from(tmp.children);
      if(children.length===0)continue;

      // Also include next card's header if it exists
      let headerToSteal=nxt.headerHTML||'';

      // Try stealing one child at a time
      let stolen=0;
      for(let c=0;c<children.length;c++){
        const extra=(c===0&&headerToSteal)?headerToSteal+'\n':'';
        const candidate=cur.contentHTML+'\n'+extra+children[c].outerHTML;
        const testCard={...cur,contentHTML:candidate};
        const testH=measureCard(testCard,CARD_H,stage);
        if(testH>CARD_H)break;
        stolen=c+1;
        cur.contentHTML=candidate;
      }

      if(stolen>0){
        changed=true;
        if(stolen>=children.length){
          // Fully consumed next card — remove it
          cards.splice(i+1,1);
          i--; // Re-check current
        } else {
          // Update next card with remaining children
          const remaining=children.slice(stolen).map(c=>c.outerHTML).join('\n');
          nxt.contentHTML=remaining;
          // If we stole with the header, clear it from next
          if(headerToSteal) nxt.headerHTML='';
        }
      }
    }
  }
}

/* ---- Backward merge ---- */
async function backwardMerge(cards,CARD_H,stage){
  while(cards.length>=2){
    const last=cards[cards.length-1];
    if(last.type==='cover')break;
    const lastH=measureCard(last,CARD_H,stage);
    if(lastH/CARD_H>=0.50)break; // OK if ≥50% filled, otherwise try merge
    const prev=cards[cards.length-2];
    if(prev.type==='cover')break;
    const mHTML=prev.contentHTML+'\n<hr>\n'+last.contentHTML;
    const mCard={...prev,contentHTML:mHTML};
    const h=measureCard(mCard,CARD_H,stage);
    if(h<=CARD_H){prev.contentHTML=mHTML;cards.pop();continue}
    break;
  }
}

/* ---- Measure card height ---- */
function measureCard(card,CARD_H,stage){
  stage.innerHTML=buildCardDOM(card,1,1);
  const el=stage.querySelector('.xhs-card');
  if(!el)return 9999;
  el.style.height='auto';
  const h=el.scrollHeight;
  stage.innerHTML='';
  return h;
}


/* ---- Build card DOM string ---- */
function buildCardDOM(card,pageNum,total){
  const CARD_H=getH();
  const b=brand();

  if(card.type==='cover'){
    let ab='';
    const bq=card.md.match(/^>\s*(.+)/m);
    if(bq){ab=card.md.split('\n').filter(l=>l.trim().startsWith('>')).map(l=>l.replace(/^>\s*/,'').replace(/\*\*/g,'')).join(' ')}
    const em=card.title.match(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u);
    const hero=em?em[0]:'✦';
    const clean=card.title.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,'').trim();
    return `<div class="t-${theme}"><div class="xhs-card cover" style="width:${CARD_W}px;height:${CARD_H}px">
      <div class="card-body">
        <div style="flex:1"></div>
        <div class="cv-emoji">${hero}</div>
        <h1>${esc(clean)}</h1>
        <div class="cv-sub">${esc(ab)}</div>
        <div class="cv-tag">${esc(b)}</div>
        <div class="cv-deco">${'<i></i>'.repeat(5)}</div>
      </div>
      <div class="card-foot" style="color:rgba(255,255,255,.35)"><span>${esc(b)}</span><span>${pageNum}/${total}</span></div>
    </div></div>`;
  }

  const isCenter=card._isLast;
  const bodyS=isCenter?'justify-content:center;':'';
  const wrapS=isCenter?'flex:0 0 auto;':'';
  return `<div class="t-${theme}"><div class="xhs-card" style="width:${CARD_W}px;height:${CARD_H}px">
    <div class="card-body" style="${bodyS}"><div class="content-wrap" style="${wrapS}">
      ${card.headerHTML||''}
      <div class="content">${card.contentHTML}</div>
    </div></div>
    <div class="card-foot"><span>${esc(b)}</span><span>${pageNum}/${total}</span></div>
  </div></div>`;
}


/* ======================================================================
   PARSE — Split markdown by ## headings (respects code fences)
   ====================================================================== */
function parse(md){
  const lines=md.split('\n');
  const secs=[];let buf=[];let title='';let num='';let isCov=false;let inCode=false;

  function flush(){
    const t=buf.join('\n').trim();
    if(!t&&!isCov)return;
    secs.push({type:isCov?'cover':'section',title,num,md:t});
    buf=[];isCov=false;
  }

  for(const line of lines){
    if(line.trim().startsWith('```')){inCode=!inCode;buf.push(line);continue}
    if(inCode){buf.push(line);continue}
    if(/^# [^#]/.test(line)){flush();title=line.slice(2).trim();num='';isCov=true;continue}
    if(/^## /.test(line)){flush();const raw=line.slice(3).trim();
      const m=raw.match(/^([\u4e00-\u9fff\d]+)[、.．]\s*(.+)/);
      if(m){num=m[1];title=m[2]}else{num='';title=raw}
      continue}
    buf.push(line);
  }
  flush();return secs;
}


/* ======================================================================
   DOWNLOAD — Render with snapDOM + ZIP
   ====================================================================== */
async function downloadAll(){
  if(!cardBlobs.length)return toast('⚠️ 先生成卡片');
  const ov=document.getElementById('ov');ov.classList.add('on');
  const ovt=document.getElementById('ov-t');
  const total=cardBlobs.length;
  const CARD_H=getH();
  const stage=document.getElementById('stage');

  try{
    const zip=new JSZip();
    const hasSnapdom=typeof snapdom!=='undefined';

    for(let i=0;i<total;i++){
      ovt.textContent=`渲染 ${i+1}/${total} …`;
      const {card,idx}=cardBlobs[i];
      const html=buildCardDOM(card,i+1,total);
      stage.innerHTML=html;
      await frame();

      const el=stage.querySelector('.xhs-card');
      if(!el)continue;

      let blob;
      if(hasSnapdom){
        // Use snapDOM — much faster & higher fidelity
        const snap=await snapdom(el,{scale:1});
        blob=await snap.toBlob({format:'png'});
      } else {
        // Fallback: html2canvas (shouldn't happen)
        const canvas=document.createElement('canvas');
        canvas.width=CARD_W;canvas.height=CARD_H;
        const ctx=canvas.getContext('2d');
        // Simple fallback — draw white rect
        ctx.fillStyle='#fff';ctx.fillRect(0,0,CARD_W,CARD_H);
        blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
      }

      zip.file(`card_${String(i+1).padStart(2,'0')}.png`,blob);
      stage.innerHTML='';
    }

    ovt.textContent='打包 ZIP …';
    const zipBlob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(zipBlob);
    a.download=`cards-${Date.now()}.zip`;a.click();
    URL.revokeObjectURL(a.href);
    toast('✅ 已下载 '+total+' 张');
  }catch(e){console.error(e);toast('❌ '+e.message)}
  finally{ov.classList.remove('on')}
}

const DEMO=`# 🚀 5 个让代码提速 10 倍的 Python 技巧

> 掌握这些高级技巧，让你的 Python 代码从"能跑"变成"飞快"

## 一、列表推导式 vs for 循环

列表推导式不只是语法糖，CPython 底层有专门的字节码优化。

\`\`\`python
# ❌ 慢 — 普通 for 循环
result = []
for i in range(1000000):
    if i % 2 == 0:
        result.append(i ** 2)

# ✅ 快 — 列表推导式 (快 30-50%)
result = [i ** 2 for i in range(1000000) if i % 2 == 0]
\`\`\`

### 为什么更快？

- \`LIST_APPEND\` 字节码，避免属性查找
- 循环变量在 C 层面迭代
- 内存预分配更优

## 二、\`__slots__\` 减少 80% 内存

\`\`\`python
# ❌ 每个实例多用 ~200 bytes
class Point:
    def __init__(self, x, y):
        self.x = x
        self.y = y

# ✅ 内存减少 80%
class Point:
    __slots__ = ('x', 'y')
    def __init__(self, x, y):
        self.x = x
        self.y = y
\`\`\`

| 方案 | 实例大小 | 100万实例 |
|------|---------|----------|
| 普通类 | ~328 bytes | ~313 MB |
| \`__slots__\` | ~72 bytes | ~69 MB |

> 💡 如果一个类会创建大量实例（>10K），务必用 \`__slots__\`

## 三、\`lru_cache\` 一行代码加速

\`\`\`python
from functools import lru_cache

@lru_cache(maxsize=None)
def fib(n):
    if n < 2: return n
    return fib(n - 1) + fib(n - 2)

# fib(100) 瞬间完成
\`\`\`

适用场景：纯函数、参数可哈希、API 调用缓存

## 四、生成器处理大文件

\`\`\`python
# ✅ 流式处理，内存 ~0
def read_huge(path):
    with open(path) as f:
        for line in f:
            yield line.strip().split(',')
\`\`\`

## 五、并发三剑客

| 方案 | 场景 | 加速 |
|------|------|------|
| **多线程** | I/O 密集 | 5-20x |
| **多进程** | CPU 密集 | Nx |
| **asyncio** | 高并发 I/O | 100-1000x |

\`\`\`python
from concurrent.futures import ThreadPoolExecutor
with ThreadPoolExecutor(20) as pool:
    results = pool.map(download, urls)
\`\`\`

## 结论

| 技巧 | 提速 | 难度 |
|------|------|------|
| 列表推导式 | 30-50% | ⭐ |
| \`__slots__\` | 80% 省内存 | ⭐⭐ |
| \`lru_cache\` | 100-10000x | ⭐ |
| 生成器 | ∞ | ⭐⭐ |
| 并发 | 5-1000x | ⭐⭐⭐ |

> 🔑 过早优化是万恶之源，但了解这些模式能让你写出 10x 更快的代码。
`;


/* ---- Utils ---- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function frame(){return new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)))}
function stat(s){document.getElementById('st-t').textContent=s}
function prog(p){document.getElementById('pf').style.width=p+'%'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
