<script>
// =========================================================================
// CardCraft — Markdown → Xiaohongshu Cards (100% Client-Side)
// =========================================================================

// --- State ---
let currentTheme = 'violet';
let currentCards = [];     // Array of rendered card image blobs
let currentSections = [];  // Parsed sections
let generateTimer = null;  // Debounce timer for auto-generation
let isGenerating = false;  // Lock to prevent concurrent generation
let generationVersion = 0; // Monotonic counter to cancel stale generation

const CARD_W = 1080;
const RATIOS = { '3:4': 1440, '2:3': 1620, '9:16': 1920, '1:1': 1080 };

// Minimum fill ratio — cards with less content than this fraction of height
// will try to borrow content from next card or merge
const MIN_FILL_RATIO = 0.82;

function getCardH() { return RATIOS[document.getElementById('sel-ratio').value] || 1440; }

// --- Markdown parser (marked.js) setup ---
marked.setOptions({
  gfm: true,
  breaks: false,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

// --- Theme picker ---
document.getElementById('theme-picker').addEventListener('click', e => {
  const dot = e.target.closest('.theme-dot');
  if (!dot) return;
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  currentTheme = dot.dataset.theme;
  triggerGenerate();
});

// --- Ratio / Density / Brand change → regenerate ---
document.getElementById('sel-ratio').addEventListener('change', triggerGenerate);
document.getElementById('sel-density').addEventListener('change', triggerGenerate);
document.getElementById('inp-brand').addEventListener('input', triggerGenerate);

// --- Input: char count + auto-generate ---
document.getElementById('md-input').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length + ' 字符';
  triggerGenerate();
});

// --- Also trigger on paste (catches cmd+v, right-click paste, etc.) ---
document.getElementById('md-input').addEventListener('paste', function() {
  // Use setTimeout so the pasted content is already in the textarea
  setTimeout(() => {
    document.getElementById('char-count').textContent = this.value.length + ' 字符';
    triggerGenerate();
  }, 50);
});

// --- Drag & Drop .md files ---
const editorArea = document.getElementById('editor-area');
editorArea.addEventListener('dragover', e => { e.preventDefault(); editorArea.classList.add('drop-highlight'); });
editorArea.addEventListener('dragleave', () => editorArea.classList.remove('drop-highlight'));
editorArea.addEventListener('drop', e => {
  e.preventDefault();
  editorArea.classList.remove('drop-highlight');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.md') || file.name.endsWith('.txt') || file.name.endsWith('.markdown'))) {
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('md-input').value = ev.target.result;
      document.getElementById('md-input').dispatchEvent(new Event('input'));
      toast('📄 已加载 ' + file.name);
    };
    reader.readAsText(file);
  } else {
    toast('⚠️ 请拖入 .md 或 .txt 文件');
  }
});


// =========================================================================
// AUTO-GENERATE — Debounced, cancellable
// =========================================================================

function triggerGenerate() {
  if (generateTimer) clearTimeout(generateTimer);

  const md = document.getElementById('md-input').value.trim();
  if (!md) {
    // Clear preview
    const preview = document.getElementById('preview-scroll');
    preview.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-icon">✦</div><h3>粘贴 Markdown，实时预览</h3><p>输入或粘贴 Markdown 内容后自动生成卡片</p></div>';
    document.getElementById('btn-download').disabled = true;
    document.getElementById('card-count').textContent = '';
    document.getElementById('preview-info').textContent = '';
    setStatus('<span class="live-dot idle"></span>粘贴 Markdown 即可自动生成');
    setProgress(0);
    currentCards = [];
    currentSections = [];
    return;
  }

  // Show "waiting" indicator
  setStatus('<span class="live-dot"></span>等待输入停止 …');

  // Debounce: wait 600ms after last keystroke
  generateTimer = setTimeout(() => {
    generateCards();
  }, 600);
}


// =========================================================================
// SECTION PARSING — Split markdown by ## headings
// =========================================================================

function parseSections(md) {
  const lines = md.split('\n');
  const sections = [];
  let buf = [];
  let currentTitle = '';
  let currentNum = '';
  let isCover = false;
  let inCodeBlock = false;

  function flush() {
    if (buf.length === 0 && !isCover) return;
    const text = buf.join('\n').trim();
    if (!text && !isCover) return;
    sections.push({
      type: isCover ? 'cover' : 'section',
      title: currentTitle,
      num: currentNum,
      md: text
    });
    buf = [];
    isCover = false;
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Track code fences
    if (line.trim().startsWith('```')) {
      inCodeBlock = !inCodeBlock;
      buf.push(line);
      continue;
    }

    if (inCodeBlock) {
      buf.push(line);
      continue;
    }

    // Skip cover images
    if (line.trim().startsWith('![') && (line.includes('封面') || line.includes('cover'))) continue;

    // H1 → Cover card
    if (/^# [^#]/.test(line)) {
      flush();
      currentTitle = line.replace(/^# /, '').trim();
      currentNum = '';
      isCover = true;
      continue;
    }

    // H2 → New section
    if (/^## /.test(line)) {
      flush();
      const raw = line.replace(/^## /, '').trim();
      const m = raw.match(/^([\u4e00-\u9fff\d]+)[、.．]\s*(.+)/);
      if (m) {
        currentNum = m[1];
        currentTitle = m[2];
      } else {
        currentNum = '';
        currentTitle = raw;
      }
      continue;
    }

    buf.push(line);
  }
  flush();

  return sections;
}


// =========================================================================
// BUILD CARD HTML
// =========================================================================

function getDensity() { return document.getElementById('sel-density').value || 'comfortable'; }

function getDensityCSS() {
  const d = getDensity();
  if (d === 'compact') {
    return `
      .xhs-card .card-inner { padding: 52px 56px 72px; }
      .xhs-card .card-footer { bottom: 24px; left: 56px; right: 56px; font-size: 16px; }
      .xhs-card .sec-header { gap: 14px; margin-bottom: 24px; }
      .xhs-card .sec-num { font-size: 18px; width: 42px; height: 42px; border-radius: 12px; }
      .xhs-card .sec-title { font-size: 32px; }
      .xhs-card .content h3 { font-size: 22px; margin: 22px 0 10px; padding-left: 13px; border-left-width: 4px; }
      .xhs-card .content p { font-size: 19px; line-height: 1.75; margin-bottom: 12px; }
      .xhs-card .content code:not(pre code) { font-size: 17px; padding: 2px 6px; }
      .xhs-card .content pre { font-size: 14px; padding: 16px 20px; margin: 12px 0 14px; line-height: 1.55; }
      .xhs-card .content table { font-size: 17px; margin: 12px 0 14px; }
      .xhs-card .content thead th { font-size: 16px; padding: 10px 12px; }
      .xhs-card .content tbody td { padding: 9px 12px; }
      .xhs-card .content blockquote { font-size: 18px; padding: 14px 18px; margin: 12px 0 14px; }
      .xhs-card .content blockquote p { font-size: 18px; }
      .xhs-card .content ul, .xhs-card .content ol { font-size: 19px; margin: 10px 0 12px 28px; }
      .xhs-card .content li { margin-bottom: 5px; }
      .xhs-card .content hr { margin: 24px 0; }
    `;
  }
  if (d === 'spacious') {
    return `
      .xhs-card .card-inner { padding: 80px 80px 110px; }
      .xhs-card .card-footer { bottom: 36px; left: 80px; right: 80px; font-size: 24px; }
      .xhs-card .sec-header { gap: 22px; margin-bottom: 40px; }
      .xhs-card .sec-num { font-size: 30px; width: 64px; height: 64px; border-radius: 18px; }
      .xhs-card .sec-title { font-size: 46px; }
      .xhs-card .content h3 { font-size: 32px; margin: 36px 0 18px; padding-left: 20px; border-left-width: 6px; }
      .xhs-card .content p { font-size: 28px; line-height: 1.9; margin-bottom: 22px; }
      .xhs-card .content code:not(pre code) { font-size: 25px; padding: 3px 10px; }
      .xhs-card .content pre { font-size: 22px; padding: 26px 30px; margin: 22px 0 26px; line-height: 1.7; }
      .xhs-card .content table { font-size: 25px; margin: 22px 0 26px; }
      .xhs-card .content thead th { font-size: 24px; padding: 15px 20px; }
      .xhs-card .content tbody td { padding: 14px 20px; }
      .xhs-card .content blockquote { font-size: 26px; padding: 24px 28px; margin: 22px 0 26px; }
      .xhs-card .content blockquote p { font-size: 26px; }
      .xhs-card .content ul, .xhs-card .content ol { font-size: 28px; margin: 16px 0 22px 40px; }
      .xhs-card .content li { margin-bottom: 12px; }
      .xhs-card .content hr { margin: 40px 0; }
    `;
  }
  return '';
}

function buildCardHTML(section, pageNum, totalPages, theme) {
  const CARD_H = getCardH();
  const brandName = document.getElementById('inp-brand').value || 'CardCraft';
  const densityCSS = getDensityCSS();

  if (section.type === 'cover') {
    let abstract = '';
    const bqMatch = section.md.match(/^>\s*(.+)/m);
    if (bqMatch) {
      abstract = section.md.split('\n')
        .filter(l => l.trim().startsWith('>'))
        .map(l => l.replace(/^>\s*/, '').replace(/\*\*/g, ''))
        .join(' ');
    }

    const emojiMatch = section.title.match(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u);
    const heroText = emojiMatch ? emojiMatch[0] : '✦';

    return `
      <div class="theme-${theme}">
        <style>${densityCSS}</style>
        <div class="xhs-card cover-card" style="width:${CARD_W}px;height:${CARD_H}px;">
          <div class="card-inner" style="flex:1;">
            <div style="flex:1;"></div>
            <div class="cover-emoji">${heroText}</div>
            <h1>${escapeHTML(section.title.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim())}</h1>
            <div class="cover-sub">${escapeHTML(abstract)}</div>
            <div class="cover-tag">${escapeHTML(brandName)}</div>
            <div class="cover-deco">${'<span></span>'.repeat(5)}</div>
          </div>
          <div class="card-footer" style="color:rgba(255,255,255,0.4);">
            <span>${escapeHTML(brandName)}</span>
            <span>${pageNum}/${totalPages}</span>
          </div>
        </div>
      </div>`;
  }

  // Regular section
  // Dynamic spacing: use measured _blankPx to expand spacing proportionally
  // Use inline styles (NOT <style> tags) for html2canvas compatibility
  let expandInnerStyle = '';
  let expandHeaderStyle = '';
  let expandGapPx = 0;
  if (section._blankPx && section._blankPx > 40) {
    const blank = section._blankPx;
    const childCount = section._childCount || 1;
    expandGapPx = Math.min(50, Math.round(blank * 0.5 / Math.max(childCount, 1)));
    const extraPadTop = Math.round(blank * 0.2);
    const extraPadBot = Math.round(blank * 0.3);
    expandInnerStyle = `padding-top:${72 + extraPadTop}px;padding-bottom:${100 + extraPadBot}px;`;
    expandHeaderStyle = `style="margin-bottom:${36 + expandGapPx}px;"`;
  }

  // Parse content and inject inline margin-bottom if expanding
  let contentHTML = marked.parse(section.md);
  if (expandGapPx > 0) {
    // Add inline margin-bottom to each top-level HTML element
    const mbVal = 16 + expandGapPx;
    contentHTML = contentHTML.replace(
      /(<(?:p|pre|table|blockquote|ul|ol|h[1-6]|hr)\b)([^>]*>)/gi,
      (match, tag, rest) => {
        if (rest.includes('style="')) {
          // Append to existing style
          return tag + rest.replace('style="', `style="margin-bottom:${mbVal}px;`);
        }
        return `${tag} style="margin-bottom:${mbVal}px;"${rest.slice(1)}`;
      }
    );
  }

  let headerHTML = '';
  if (section.num) {
    headerHTML = `
      <div class="sec-header" ${expandHeaderStyle}>
        <div class="sec-num">${escapeHTML(section.num)}</div>
        <div class="sec-title">${escapeHTML(section.title)}</div>
      </div>`;
  } else if (section.title) {
    headerHTML = `<div class="sec-header" ${expandHeaderStyle}><div class="sec-title">${escapeHTML(section.title)}</div></div>`;
  }

  return `
    <div class="theme-${theme}">
      <style>${densityCSS}</style>
      <div class="xhs-card" style="width:${CARD_W}px;height:${CARD_H}px;display:flex;flex-direction:column;">
        <div class="card-inner" style="flex-shrink:0;${expandInnerStyle}">
          ${headerHTML}
          <div class="content">${contentHTML}</div>
        </div>
        <div class="card-bottom-fill"></div>
        <div class="card-footer">
          <span>${escapeHTML(brandName)}</span>
          <span>${pageNum}/${totalPages}</span>
        </div>
      </div>
    </div>`;
}

function escapeHTML(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}


// =========================================================================
// MEASURE CARD — Returns the actual content height of a section
// =========================================================================

async function measureSection(sec, theme) {
  const CARD_H = getCardH();
  const stage = document.getElementById('render-stage');
  // Build with auto height to get natural content height
  const brandName = document.getElementById('inp-brand').value || 'CardCraft';
  const densityCSS = getDensityCSS();
  const contentHTML = marked.parse(sec.md);

  let headerHTML = '';
  if (sec.num) {
    headerHTML = `<div class="sec-header"><div class="sec-num">${escapeHTML(sec.num)}</div><div class="sec-title">${escapeHTML(sec.title)}</div></div>`;
  } else if (sec.title) {
    headerHTML = `<div class="sec-header"><div class="sec-title">${escapeHTML(sec.title)}</div></div>`;
  }

  const html = `
    <div class="theme-${theme}">
      <style>${densityCSS}</style>
      <div class="xhs-card" style="width:${CARD_W}px;">
        <div class="card-inner">
          ${headerHTML}
          <div class="content">${contentHTML}</div>
        </div>
      </div>
    </div>`;

  stage.innerHTML = html;
  await sleep(30);
  const card = stage.querySelector('.xhs-card');
  const h = card ? card.scrollHeight : 0;
  stage.innerHTML = '';
  return h;
}


// =========================================================================
// PRE-MERGE — Combine adjacent small sections
// =========================================================================

async function preMergeSections(sections, theme) {
  const CARD_H = getCardH();
  const result = [sections[0]];

  for (let i = 1; i < sections.length; i++) {
    const cur = sections[i];
    const prev = result[result.length - 1];

    if (cur.type === 'cover' || prev.type === 'cover') {
      result.push(cur);
      continue;
    }

    const sectionHeader = cur.num
      ? `\n\n---\n\n### ${cur.num}、${cur.title}\n\n`
      : `\n\n---\n\n### ${cur.title}\n\n`;
    const mergedMd = prev.md + sectionHeader + cur.md;

    const testSec = { ...prev, md: mergedMd };
    const testH = await measureSection(testSec, theme);

    if (testH <= CARD_H) {
      prev.md = mergedMd;
    } else {
      result.push(cur);
    }
  }

  return result;
}


// =========================================================================
// ADAPTIVE SPLITTING — Split oversized, merge underfilled
// =========================================================================

async function adaptiveSplit(sections, theme, version) {
  const CARD_H = getCardH();
  let result = [];

  for (const sec of sections) {
    if (version !== generationVersion) return [];

    if (sec.type === 'cover') {
      result.push(sec);
      continue;
    }

    const h = await measureSection(sec, theme);

    if (h <= CARD_H + 20) {
      result.push(sec);
      continue;
    }

    // Split by blocks
    const mdLines = sec.md.split('\n');
    const blocks = splitMdIntoBlocks(mdLines);

    let currentMd = '';
    let partNum = 0;

    for (let bi = 0; bi < blocks.length; bi++) {
      const candidate = currentMd + (currentMd ? '\n\n' : '') + blocks[bi];
      const testSec = { ...sec, md: candidate };
      const testH = await measureSection(testSec, theme);

      if (testH > CARD_H && currentMd.trim()) {
        partNum++;
        result.push({
          type: 'section',
          title: sec.title + (partNum > 1 ? '（续）' : ''),
          num: sec.num,
          md: currentMd
        });
        currentMd = blocks[bi];
      } else {
        currentMd = candidate;
      }
    }

    if (currentMd.trim()) {
      partNum++;
      result.push({
        type: 'section',
        title: sec.title + (partNum > 1 ? '（续）' : ''),
        num: sec.num,
        md: currentMd
      });
    }
  }

  // === POST-PASS 1: Forward merge small cards ===
  let merged = [result[0]];
  for (let i = 1; i < result.length; i++) {
    if (version !== generationVersion) return [];
    const cur = result[i];
    const prev = merged[merged.length - 1];

    if (cur.type === 'cover' || prev.type === 'cover') {
      merged.push(cur);
      continue;
    }

    const divider = cur.num ? `\n\n---\n\n## ${cur.num ? cur.num + '、' : ''}${cur.title}\n\n` : '\n\n---\n\n';
    const mergedMd = prev.md + divider + cur.md;
    const testSec = { ...prev, md: mergedMd };
    const testH = await measureSection(testSec, theme);

    if (testH <= CARD_H) {
      prev.md = mergedMd;
    } else {
      merged.push(cur);
    }
  }
  result = merged;

  // === POST-PASS 2: Merge trailing short card ===
  while (result.length >= 2) {
    const last = result[result.length - 1];
    const prev = result[result.length - 2];
    if (last.type === 'cover' || prev.type === 'cover') break;

    const mergedMd = prev.md + '\n\n---\n\n' + last.md;
    const testSec = { ...prev, md: mergedMd };
    const testH = await measureSection(testSec, theme);

    if (testH <= CARD_H) {
      prev.md = mergedMd;
      result.pop();
    } else {
      break;
    }
  }

  // === POST-PASS 3: Fill underfilled cards by stealing from next card ===
  // Run multiple passes until no more stealing is possible
  let stealingOccurred = true;
  while (stealingOccurred) {
    stealingOccurred = false;
    for (let i = 0; i < result.length - 1; i++) {
      if (version !== generationVersion) return [];
      const sec = result[i];
      const next = result[i + 1];
      if (sec.type === 'cover' || next.type === 'cover') continue;

      const h = await measureSection(sec, theme);
      const fillRatio = h / CARD_H;

      if (fillRatio >= MIN_FILL_RATIO) continue;

      // This card is underfilled — try stealing blocks from the next card
      const nextBlocks = splitMdIntoBlocks(next.md.split('\n'));
      let stolen = 0;

      for (let b = 0; b < nextBlocks.length; b++) {
        const candidate = sec.md + '\n\n' + nextBlocks.slice(0, b + 1).join('\n\n');
        const testSec = { ...sec, md: candidate };
        const testH = await measureSection(testSec, theme);

        if (testH > CARD_H) break;
        stolen = b + 1;
      }

      if (stolen > 0) {
        sec.md = sec.md + '\n\n' + nextBlocks.slice(0, stolen).join('\n\n');
        const remainingBlocks = nextBlocks.slice(stolen);
        if (remainingBlocks.length === 0) {
          // Next card fully consumed — remove it
          result.splice(i + 1, 1);
          i--; // Re-check this card
        } else {
          next.md = remainingBlocks.join('\n\n');
        }
        stealingOccurred = true;
      }
    }
  }

  // === POST-PASS 4: Backward merge — if last card is underfilled, push into previous ===
  while (result.length >= 2) {
    const last = result[result.length - 1];
    if (last.type === 'cover') break;

    const lastH = await measureSection(last, theme);
    if (lastH / CARD_H >= MIN_FILL_RATIO) break;

    const prev = result[result.length - 2];
    if (prev.type === 'cover') break;

    // Try merging with divider first
    let mergedMd = prev.md + '\n\n---\n\n' + last.md;
    let testSec = { ...prev, md: mergedMd };
    let testH = await measureSection(testSec, theme);

    if (testH <= CARD_H) {
      prev.md = mergedMd;
      result.pop();
      continue;
    }

    // Try without divider (saves ~40px)
    mergedMd = prev.md + '\n\n' + last.md;
    testSec = { ...prev, md: mergedMd };
    testH = await measureSection(testSec, theme);

    if (testH <= CARD_H) {
      prev.md = mergedMd;
      result.pop();
      continue;
    }

    // If last card is very short (<35% fill), force-merge by appending just
    // the text content without its section header (which wastes space)
    if (lastH / CARD_H < 0.35) {
      // Just append the raw md text to previous card's content
      mergedMd = prev.md + '\n\n' + last.md;
      // Even if it slightly overflows, the card will clip —
      // better than a nearly empty standalone card
      prev.md = mergedMd;
      result.pop();
      continue;
    }

    break;
  }

  return result;
}

// Split markdown text into logical blocks
function splitMdIntoBlocks(lines) {
  const blocks = [];
  let buf = [];
  let inCode = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.trim().startsWith('```')) {
      if (inCode) {
        buf.push(line);
        blocks.push(buf.join('\n'));
        buf = [];
        inCode = false;
      } else {
        if (buf.length) { blocks.push(buf.join('\n')); buf = []; }
        buf.push(line);
        inCode = true;
      }
      continue;
    }

    if (inCode) { buf.push(line); continue; }

    // Table block
    if (line.includes('|') && i + 1 < lines.length && lines[i + 1].includes('---')) {
      if (buf.length) { blocks.push(buf.join('\n')); buf = []; }
      while (i < lines.length && lines[i].includes('|')) {
        buf.push(lines[i]);
        i++;
      }
      i--;
      blocks.push(buf.join('\n'));
      buf = [];
      continue;
    }

    if (line.trim() === '') {
      if (buf.length) { blocks.push(buf.join('\n')); buf = []; }
      continue;
    }

    if (/^#{1,6}\s/.test(line)) {
      if (buf.length) { blocks.push(buf.join('\n')); buf = []; }
      blocks.push(line);
      continue;
    }

    buf.push(line);
  }

  if (buf.length) blocks.push(buf.join('\n'));
  return blocks;
}


// =========================================================================
// GENERATE — Main pipeline (auto-triggered, cancellable)
// =========================================================================

async function generateCards() {
  const md = document.getElementById('md-input').value.trim();
  if (!md) return;

  // Cancel any in-progress generation
  const thisVersion = ++generationVersion;

  if (isGenerating) {
    // Previous generation will notice version changed and bail
    // Wait a moment for it to stop
    await sleep(100);
  }

  isGenerating = true;
  const btnDown = document.getElementById('btn-download');
  btnDown.disabled = true;

  setStatus('<span class="live-dot"></span>解析中 …');
  setProgress(5);

  try {
    // 1. Parse
    let sections = parseSections(md);
    if (thisVersion !== generationVersion) return;

    setStatus(`<span class="live-dot"></span>智能排版 ${sections.length} 个章节 …`);
    setProgress(15);

    // 2. Pre-merge
    sections = await preMergeSections(sections, currentTheme);
    if (thisVersion !== generationVersion) return;
    setProgress(20);

    // 3. Adaptive split + fill
    sections = await adaptiveSplit(sections, currentTheme, thisVersion);
    if (thisVersion !== generationVersion || sections.length === 0) return;

    currentSections = sections;
    const total = sections.length;
    setStatus(`<span class="live-dot"></span>渲染 ${total} 张卡片 …`);
    setProgress(25);

    // 4. Measure actual content heights for spacing expansion
    const CARD_H = getCardH();
    const stage = document.getElementById('render-stage');
    for (let i = 0; i < total; i++) {
      if (thisVersion !== generationVersion) return;
      const sec = sections[i];
      if (sec.type === 'cover') { sec._blankPx = 0; continue; }
      // Render at natural height to measure
      const html = buildCardHTML(sec, i + 1, total, currentTheme);
      stage.innerHTML = html;
      await sleep(30);
      const card = stage.querySelector('.xhs-card');
      const inner = card ? card.querySelector('.card-inner') : null;
      if (inner) {
        const contentH = inner.scrollHeight;
        sec._blankPx = Math.max(0, CARD_H - contentH - 60);
        const contentDiv = inner.querySelector('.content');
        sec._childCount = contentDiv ? contentDiv.children.length : 1;
      } else {
        sec._blankPx = 0;
        sec._childCount = 1;
      }
      stage.innerHTML = '';
    }

    // 5. Render to images
    const preview = document.getElementById('preview-scroll');
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();
    preview.innerHTML = '';

    currentCards = [];
    const scale = Math.min(1, (preview.clientWidth - 48) / CARD_W);

    for (let i = 0; i < total; i++) {
      if (thisVersion !== generationVersion) return;

      setStatus(`<span class="live-dot"></span>渲染 ${i + 1}/${total} …`);
      setProgress(25 + (i / total) * 65);

      const html = buildCardHTML(sections[i], i + 1, total, currentTheme);
      stage.innerHTML = html;
      await sleep(80);

      const cardEl = stage.querySelector('.xhs-card');
      if (!cardEl) continue;

      // Force exact card height — content fills top, bottom-fill takes remainder
      cardEl.style.height = CARD_H + 'px';
      cardEl.style.overflow = 'hidden';

      await sleep(50);

      try {
        const canvas = await html2canvas(cardEl, {
          width: CARD_W,
          height: CARD_H,
          scale: 1,
          useCORS: true,
          backgroundColor: null,
          logging: false,
        });

        if (thisVersion !== generationVersion) return;

        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        currentCards.push(blob);

        // Add to preview
        const frame = document.createElement('div');
        frame.className = 'card-frame';
        frame.style.width = (CARD_W * scale) + 'px';
        frame.style.height = (CARD_H * scale) + 'px';

        const badge = document.createElement('div');
        badge.className = 'card-badge';
        badge.textContent = `${i + 1}/${total}`;

        const img = document.createElement('img');
        img.src = URL.createObjectURL(blob);
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';

        frame.appendChild(badge);
        frame.appendChild(img);
        preview.appendChild(frame);

      } catch (err) {
        console.error('html2canvas error:', err);
      }

      stage.innerHTML = '';
    }

    if (thisVersion !== generationVersion) return;

    setProgress(100);
    setStatus(`<span class="live-dot idle"></span>✅ ${total} 张卡片`);
    document.getElementById('preview-info').textContent = `${CARD_W}×${CARD_H}  ·  ${total} 张`;
    document.getElementById('card-count').textContent = `${total} 张`;
    btnDown.disabled = false;

  } finally {
    if (thisVersion === generationVersion) {
      isGenerating = false;
    }
  }
}


// =========================================================================
// DOWNLOAD — ZIP all cards
// =========================================================================

async function downloadAll() {
  if (!currentCards.length) return toast('⚠️ 请先生成卡片');

  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  document.getElementById('overlay-text').textContent = '正在打包 ZIP …';

  try {
    const zip = new JSZip();
    currentCards.forEach((blob, i) => {
      zip.file(`card_${String(i + 1).padStart(2, '0')}.png`, blob);
    });

    const zipBlob = await zip.generateAsync({ type: 'blob' }, meta => {
      document.getElementById('overlay-text').textContent =
        `正在打包 … ${Math.round(meta.percent)}%`;
    });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = `xiaohongshu-cards-${Date.now()}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);

    toast('✅ ZIP 已下载！');
  } catch (err) {
    console.error('ZIP error:', err);
    toast('❌ 打包失败：' + err.message);
  } finally {
    overlay.classList.remove('active');
  }
}

const DEMO_MD = `# 🚀 5 个让你的代码提速 10 倍的 Python 技巧

> 掌握这些高级技巧，让你的 Python 代码从"能跑"变成"飞快"。适合中级开发者进阶学习。

## 一、列表推导式 vs for 循环

列表推导式（List Comprehension）不只是语法糖，它在 CPython 底层有专门的字节码优化。

\`\`\`python
# ❌ 慢 — 普通 for 循环
result = []
for i in range(1000000):
    if i % 2 == 0:
        result.append(i ** 2)

# ✅ 快 — 列表推导式 (快 30-50%)
result = [i ** 2 for i in range(1000000) if i % 2 == 0]
\`\`\`

### 为什么更快？

- 列表推导式使用 \`LIST_APPEND\` 字节码，避免了属性查找
- 循环变量在 C 层面迭代，减少 Python 对象创建
- 内存预分配更优

## 二、用 \`__slots__\` 减少 80% 内存

普通类的每个实例都有一个 \`__dict__\`，很浪费内存。

\`\`\`python
# ❌ 每个实例多用 ~200 bytes
class Point:
    def __init__(self, x, y):
        self.x = x
        self.y = y

# ✅ 内存减少 80%
class Point:
    __slots__ = ('x', 'y')
    def __init__(self, x, y):
        self.x = x
        self.y = y
\`\`\`

| 方案 | 实例大小 | 100万实例 |
|------|---------|----------|
| 普通类 | ~328 bytes | ~313 MB |
| \`__slots__\` | ~72 bytes | ~69 MB |

> 💡 **经验法则**：如果一个类会创建大量实例（>10K），务必用 \`__slots__\`

## 三、\`functools.lru_cache\` 一行代码加速

递归函数的性能杀手是重复计算。\`lru_cache\` 自动缓存函数返回值。

\`\`\`python
from functools import lru_cache

@lru_cache(maxsize=None)
def fib(n):
    if n < 2:
        return n
    return fib(n - 1) + fib(n - 2)

# fib(100) 瞬间完成，而非等到宇宙热寂
\`\`\`

### 适用场景

- 纯函数（相同输入 → 相同输出）
- 参数可哈希（数字、字符串、元组）
- API 调用缓存（配合 TTL）

## 四、生成器：处理 10GB 文件不爆内存

当数据量超过内存时，生成器（Generator）是救星。

\`\`\`python
# ❌ 内存爆炸
data = open('huge_file.csv').readlines()  # 全部加载

# ✅ 流式处理，内存 ~0
def read_huge(path):
    with open(path) as f:
        for line in f:
            yield line.strip().split(',')

for row in read_huge('huge_file.csv'):
    process(row)  # 一次只处理一行
\`\`\`

### Generator Pipeline 模式

\`\`\`python
# 像 Unix 管道一样组合生成器
lines = read_huge('data.csv')
parsed = (parse_row(l) for l in lines)
filtered = (r for r in parsed if r['score'] > 90)
top_100 = itertools.islice(filtered, 100)
\`\`\`

## 五、多进程 vs 多线程 vs asyncio

Python 的并发三剑客，选错了适得其反：

| 方案 | 适用场景 | GIL 影响 | 典型加速 |
|------|---------|---------|---------|
| **多线程** | I/O 密集（网络、文件） | 受限 | 5-20x |
| **多进程** | CPU 密集（计算、ML） | 不受限 | N 核 ≈ Nx |
| **asyncio** | 高并发 I/O（万级连接） | 受限 | 100-1000x |

\`\`\`python
# 多线程 — 适合批量下载
from concurrent.futures import ThreadPoolExecutor

with ThreadPoolExecutor(max_workers=20) as pool:
    results = pool.map(download, urls)

# asyncio — 适合高并发 API 调用
import asyncio, aiohttp

async def fetch_all(urls):
    async with aiohttp.ClientSession() as s:
        tasks = [s.get(u) for u in urls]
        return await asyncio.gather(*tasks)
\`\`\`

## 结论

| 技巧 | 提速 | 难度 |
|------|------|------|
| 列表推导式 | 30-50% | ⭐ |
| \`__slots__\` | 80% 省内存 | ⭐⭐ |
| \`lru_cache\` | 100-10000x | ⭐ |
| 生成器 | ∞（不爆内存） | ⭐⭐ |
| 并发选择 | 5-1000x | ⭐⭐⭐ |

> 🔑 **记住**：过早优化是万恶之源，但了解这些模式能让你在关键时刻写出 10x 更快的代码。
